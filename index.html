<!DOCTYPE html>
<html>
<head>
  <!-- This tag tells the phone's browser: "This is a mobile site" -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <style>
    /* 1. Hide scrollbar for the main page */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      overflow: hidden; /* Standard way to hide scrollbars */
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

    /* 2. Hide scrollbar for Chrome, Safari and Opera */
    body::-webkit-scrollbar, 
    iframe::-webkit-scrollbar {
      display: none;
    }

    /* 3. Force the iframe to be fixed and gapless */
    iframe { 
      position: fixed; /* Better than 100vh for mobile browser bars */
      top: 0;
      left: 0;
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block; 
    }
  </style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbz4B53lLw2MUkJDVbiFPVZWW_eDJhvNVLA3QRfQhpuMIPRcdVGs-rvci_l4Y5Sic8jgxQ/exec"></iframe>
</body>
</html>
